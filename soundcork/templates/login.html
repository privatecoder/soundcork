<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundcork Login</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="/static/css/miniapp.css">
</head>
<body>
    <main id="main" class="login-container">
        <div class="login-card">
            <a href="/admin/" class="login-admin-link" title="Admin panel" aria-label="Admin panel">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </a>
            <h1>Soundcork</h1>
            <p>Select your account to continue</p>
            
            {% if error %}
            <div class="error-message" role="alert" aria-live="polite">
                <p>{{ error }}</p>
            </div>
            {% endif %}
            
            {% if accounts %}
            <form action="/miniapp/login" method="post">
                <fieldset style="border:none; padding:0;">
                    <legend class="sr-only">Select account</legend>
                    <ul class="account-list">
                        {% for account_id, account_data in accounts.items() %}
                        <li>
                            <button 
                                type="submit" 
                                name="account_id" 
                                value="{{ account_id }}"
                                class="account-button"
                                aria-label="Login as {{ account_data.label }}">
                                <span class="account-label">{{ account_data.label }}</span>
                                <span class="account-meta">
                                    <code class="account-id-pill">{{ account_id }}</code>
                                    {% if account_data.device_count %}
                                    <span class="account-devices">{{ account_data.device_count }} device{% if account_data.device_count != 1 %}s{% endif %}</span>
                                    {% endif %}
                                </span>
                            </button>
                        </li>
                        {% endfor %}
                    </ul>
                </fieldset>
            </form>
            {% else %}
            <div class="empty-state">
                <p>No accounts found.</p>
                <p>Please add a device to Soundcork first.</p>
            </div>
            {% endif %}
        </div>
    </main>
</body>
</html>
