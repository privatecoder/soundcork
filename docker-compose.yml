services:
  soundcork:
    build: .
    # we have to have access to the speakers for config, so run in host mode
    network_mode: host
    environment:
      # URL your speakers use to reach soundcork. Must be device-reachable —
      # use the host's LAN IP (e.g. http://192.168.1.50:8001), not localhost
      # or a container name. Port 8001 goes through nginx-ETag; 8000 is direct.
      - BASE_URL=http://192.168.1.50:8001
      - DATA_DIR=/soundcork/data
      # Log all 404/unhandled requests to this directory (for debugging)
      - UNHANDLED_LOG_DIR=/soundcork/logs/traffic
      # Optional Spotify OAuth integration
      # - SPOTIFY_CLIENT_ID=your-client-id
      # - SPOTIFY_CLIENT_SECRET=your-client-secret
      # - SPOTIFY_REDIRECT_URI=http://192.168.1.50:8001/mgmt/spotify/callback
      # Set DEV_MODE=true to run in development mode with hot reload and detailed logging
      - DEV_MODE=${DEV_MODE:-false}
    volumes:
      - ./data:/soundcork/data
      - ./logs:/soundcork/logs
    restart: unless-stopped
  nginx-etag: # see https://github.com/deborahgu/soundcork/issues/129
    image: nginx
    container_name: nginx-ETag
    # since soundcork is in host mode so is nginx
    network_mode: host
    volumes:
      - ./nginx-ETag.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

